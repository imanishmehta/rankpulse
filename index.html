<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RankPulse — Australia City Rank Checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#080810;color:#e2e8f0;font-family:'DM Mono','Courier New',monospace;min-height:100vh;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#222;border-radius:3px;}
  .inp{background:#111827;border:1px solid #1f2937;border-radius:8px;color:#e2e8f0;padding:10px 14px;width:100%;font-family:inherit;font-size:13px;outline:none;transition:border .2s;}
  .inp:focus{border-color:#6366f1;}
  .run-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;color:white;padding:13px 0;width:100%;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s,transform .1s;}
  .run-btn:hover{opacity:.88;transform:translateY(-1px);}
  .run-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
  .sm{background:#161624;border:1px solid #1f2937;border-radius:6px;color:#6b7280;padding:5px 12px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;}
  .sm:hover{background:#1f2937;color:#d1d5db;}
  .cb{border-radius:7px;padding:6px 11px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .on{background:#1e1b4b;border-color:#6366f1;color:#a5b4fc;}
  .off{background:#111827;border-color:#1f2937;color:#4b5563;}
  .off:hover{border-color:#374151;color:#9ca3af;}
  .badge{border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;display:inline-block;min-width:50px;text-align:center;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#0c0c1a;color:#4b5563;font-weight:400;padding:10px 12px;text-align:center;border-bottom:1px solid #1a1a2e;position:sticky;top:0;z-index:10;font-size:10px;letter-spacing:1px;}
  th:first-child{text-align:left;min-width:160px;}
  td{padding:10px 12px;border-bottom:1px solid #0d0d18;text-align:center;vertical-align:middle;}
  td:first-child{text-align:left;}
  tr:hover td{background:#0d0d1e;}
  .pbar{height:3px;background:#1f2937;border-radius:99px;overflow:hidden;}
  .pfill{height:100%;background:linear-gradient(90deg,#6366f1,#a855f7);transition:width .4s;}
  .pulse{animation:p 1.2s ease-in-out infinite;}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.25}}
  .tab-btn{padding:8px 18px;border:none;border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;}
  .tab-on{background:#1e1b4b;color:#a5b4fc;border:1px solid #6366f1;}
  .tab-off{background:#111827;color:#4b5563;border:1px solid #1f2937;}
  .tab-off:hover{color:#9ca3af;border-color:#374151;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// Australia Cities with state
const AU_CITIES = [
  { code:"sydney",     name:"Sydney",     state:"NSW", location:"Sydney,New South Wales,Australia" },
  { code:"melbourne",  name:"Melbourne",  state:"VIC", location:"Melbourne,Victoria,Australia" },
  { code:"brisbane",   name:"Brisbane",   state:"QLD", location:"Brisbane,Queensland,Australia" },
  { code:"perth",      name:"Perth",      state:"WA",  location:"Perth,Western Australia,Australia" },
  { code:"adelaide",   name:"Adelaide",   state:"SA",  location:"Adelaide,South Australia,Australia" },
  { code:"gold_coast", name:"Gold Coast", state:"QLD", location:"Gold Coast,Queensland,Australia" },
  { code:"canberra",   name:"Canberra",   state:"ACT", location:"Canberra,Australian Capital Territory,Australia" },
  { code:"newcastle",  name:"Newcastle",  state:"NSW", location:"Newcastle,New South Wales,Australia" },
  { code:"wollongong", name:"Wollongong", state:"NSW", location:"Wollongong,New South Wales,Australia" },
  { code:"hobart",     name:"Hobart",     state:"TAS", location:"Hobart,Tasmania,Australia" },
  { code:"geelong",    name:"Geelong",    state:"VIC", location:"Geelong,Victoria,Australia" },
  { code:"townsville", name:"Townsville", state:"QLD", location:"Townsville,Queensland,Australia" },
  { code:"cairns",     name:"Cairns",     state:"QLD", location:"Cairns,Queensland,Australia" },
  { code:"darwin",     name:"Darwin",     state:"NT",  location:"Darwin,Northern Territory,Australia" },
];

// Other Countries
const COUNTRIES = [
  { code:"in",  name:"India",         flag:"🇮🇳", location:null },
  { code:"us",  name:"United States", flag:"🇺🇸", location:null },
  { code:"gb",  name:"United Kingdom",flag:"🇬🇧", location:null },
  { code:"ca",  name:"Canada",        flag:"🇨🇦", location:null },
  { code:"sg",  name:"Singapore",     flag:"🇸🇬", location:null },
  { code:"ae",  name:"UAE",           flag:"🇦🇪", location:null },
  { code:"nz",  name:"New Zealand",   flag:"🇳🇿", location:null },
  { code:"de",  name:"Germany",       flag:"🇩🇪", location:null },
  { code:"ph",  name:"Philippines",   flag:"🇵🇭", location:null },
  { code:"my",  name:"Malaysia",      flag:"🇲🇾", location:null },
  { code:"za",  name:"South Africa",  flag:"🇿🇦", location:null },
];

function getBadge(pos) {
  if (!pos || pos === "NF") return { color:"#6b7280", bg:"#1f2937", label:"NF" };
  if (pos <= 3)  return { color:"#fbbf24", bg:"#78350f", label:`#${pos}` };
  if (pos <= 10) return { color:"#34d399", bg:"#064e3b", label:`#${pos}` };
  if (pos <= 20) return { color:"#60a5fa", bg:"#1e3a5f", label:`#${pos}` };
  if (pos <= 50) return { color:"#f97316", bg:"#431407", label:`#${pos}` };
  return { color:"#ef4444", bg:"#450a0a", label:`#${pos}` };
}

async function checkRank(apiKey, keyword, domain, gl, location) {
  try {
    const body = { q: keyword, gl: gl || "au", hl: "en", num: 100 };
    if (location) body.location = location;
    const res = await fetch("https://google.serper.dev/search", {
      method:"POST",
      headers:{"X-API-KEY":apiKey,"Content-Type":"application/json"},
      body:JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const items = [...(data.organic||[])];
    const d = domain.replace(/^https?:\/\//,"").replace(/^www\./,"").toLowerCase().replace(/\/$/,"");
    for(let i=0;i<items.length;i++){
      const link=(items[i].link||"").replace(/^https?:\/\//,"").replace(/^www\./,"").toLowerCase();
      if(link.startsWith(d)) return {position:i+1, url:items[i].link, err:null};
    }
    return {position:null, url:null, err:null};
  } catch(e){
    return {position:"ERR", url:null, err:e.message};
  }
}

function App() {
  const [apiKey,       setApiKey]       = useState("3f78f3f956a1f5870ad68e644594bced08b52585");
  const [domain,       setDomain]       = useState("adclickr.com");
  const [keywords,     setKeywords]     = useState("");
  const [tab,          setTab]          = useState("au"); // "au" or "world"
  const [selCities,    setSelCities]    = useState(["sydney","melbourne","brisbane","perth","adelaide"]);
  const [selCountries, setSelCountries] = useState(["in","us"]);
  const [results,      setResults]      = useState([]);
  const [loading,      setLoading]      = useState(false);
  const [progress,     setProgress]     = useState({done:0,total:0});
  const stopRef = useRef(false);

  const toggleCity    = (c) => setSelCities(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c]);
  const toggleCountry = (c) => setSelCountries(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c]);

  // Build combined targets based on tab
  const getTargets = () => {
    if(tab==="au"){
      return selCities.map(c=>{
        const city=AU_CITIES.find(x=>x.code===c);
        return {id:c, label:`${city.name}`, sublabel:city.state, gl:"au", location:city.location};
      });
    } else {
      return selCountries.map(c=>{
        const co=COUNTRIES.find(x=>x.code===c);
        return {id:c, label:`${co.flag} ${co.name}`, sublabel:"", gl:c, location:null};
      });
    }
  };

  const run = async () => {
    const kwList=keywords.split("\n").map(k=>k.trim()).filter(Boolean);
    const targets=getTargets();
    if(!kwList.length||!apiKey||!domain||!targets.length) return;
    stopRef.current=false; setLoading(true); setResults([]);
    const total=kwList.length*targets.length;
    setProgress({done:0,total});
    const rows=kwList.map(kw=>({keyword:kw, cols:Object.fromEntries(targets.map(t=>[t.id,{position:"...",url:null}]))}));
    setResults([...rows]);
    let done=0;
    for(let ki=0;ki<kwList.length;ki++){
      for(let ti=0;ti<targets.length;ti++){
        if(stopRef.current){setLoading(false);return;}
        const t=targets[ti];
        const r=await checkRank(apiKey,kwList[ki],domain,t.gl,t.location);
        rows[ki].cols[t.id]=r;
        setResults([...rows]);
        done++; setProgress({done,total});
        await new Promise(r=>setTimeout(r,400));
      }
    }
    setLoading(false);
  };

  const exportCSV=()=>{
    const targets=getTargets();
    const hdr=["Keyword",...targets.map(t=>t.label)];
    const rows=results.map(r=>[`"${r.keyword}"`,...targets.map(t=>{const p=r.cols[t.id]?.position;return p===null?"NF":(p||"ERR");})]);
    const csv=[hdr,...rows].map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download=`rankpulse-${domain}-${tab}-${Date.now()}.csv`; a.click();
  };

  const targets=getTargets();
  const kwCount=keywords.split("\n").filter(k=>k.trim()).length;

  return (
    <div>
      <style>{`
        .layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 70px);}
        .sidebar{background:#0c0c18;border-right:1px solid #13131f;padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
        .main{overflow-y:auto;background:#080810;}
        @media(max-width:700px){.layout{grid-template-columns:1fr;}}
      `}</style>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0e0920,#080810)",borderBottom:"1px solid #13131f",padding:"16px 24px",display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:38,height:38,background:"linear-gradient(135deg,#6366f1,#a855f7)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📡</div>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:21,fontWeight:800,background:"linear-gradient(90deg,#818cf8,#d946ef)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>RankPulse</div>
          <div style={{fontSize:9,color:"#374151",letterSpacing:3}}>AUSTRALIA CITY + GLOBAL TRACKER</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          {results.length>0&&<button className="sm" onClick={exportCSV}>⬇ CSV</button>}
          {loading&&<button className="sm" style={{color:"#f87171",borderColor:"#7f1d1d"}} onClick={()=>stopRef.current=true}>⏹ Stop</button>}
        </div>
      </div>

      <div className="layout">
        {/* Sidebar */}
        <div className="sidebar">
          <div>
            <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5,display:"block",marginBottom:7}}>API KEY</label>
            <input className="inp" type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5,display:"block",marginBottom:7}}>DOMAIN</label>
            <input className="inp" value={domain} onChange={e=>setDomain(e.target.value)} placeholder="adclickr.com"/>
          </div>
          <div>
            <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5,display:"block",marginBottom:7}}>KEYWORDS</label>
            <textarea className="inp" rows={6} value={keywords} onChange={e=>setKeywords(e.target.value)}
              placeholder={"digital marketing agency\nseo services\nweb design"} style={{resize:"vertical"}}/>
          </div>

          {/* Tab Switch */}
          <div>
            <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5,display:"block",marginBottom:9}}>TRACK BY</label>
            <div style={{display:"flex",gap:8}}>
              <button className={`tab-btn ${tab==="au"?"tab-on":"tab-off"}`} onClick={()=>setTab("au")} style={{flex:1}}>🇦🇺 Australia Cities</button>
              <button className={`tab-btn ${tab==="world"?"tab-on":"tab-off"}`} onClick={()=>setTab("world")} style={{flex:1}}>🌍 Countries</button>
            </div>
          </div>

          {/* Australia Cities */}
          {tab==="au"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5}}>CITIES ({selCities.length})</label>
                <div style={{display:"flex",gap:5}}>
                  <button className="sm" onClick={()=>setSelCities(AU_CITIES.map(c=>c.code))}>All</button>
                  <button className="sm" onClick={()=>setSelCities([])}>None</button>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {AU_CITIES.map(c=>(
                  <button key={c.code} className={`cb ${selCities.includes(c.code)?"on":"off"}`} onClick={()=>toggleCity(c.code)}>
                    <span style={{fontWeight:500}}>{c.name}</span>
                    <span style={{fontSize:9,opacity:.6}}>{c.state}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Countries */}
          {tab==="world"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <label style={{fontSize:9,color:"#4b5563",letterSpacing:2.5}}>COUNTRIES ({selCountries.length})</label>
                <div style={{display:"flex",gap:5}}>
                  <button className="sm" onClick={()=>setSelCountries(COUNTRIES.map(c=>c.code))}>All</button>
                  <button className="sm" onClick={()=>setSelCountries([])}>None</button>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {COUNTRIES.map(c=>(
                  <button key={c.code} className={`cb ${selCountries.includes(c.code)?"on":"off"}`} onClick={()=>toggleCountry(c.code)}>
                    {c.flag} {c.name}
                  </button>
                ))}
              </div>
            </div>
          )}

          {kwCount>0&&targets.length>0&&(
            <div style={{background:"#111827",border:"1px solid #1f2937",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#6b7280",lineHeight:2}}>
              <div>🔍 Keywords: <span style={{color:"#818cf8"}}>{kwCount}</span></div>
              <div>📍 Locations: <span style={{color:"#818cf8"}}>{targets.length}</span></div>
              <div>💳 Credits: <span style={{color:"#fbbf24"}}>{kwCount*targets.length}</span></div>
            </div>
          )}

          <div style={{marginTop:"auto"}}>
            <button className="run-btn" onClick={run} disabled={loading||!apiKey||!domain||!keywords||!targets.length}>
              {loading?`⏳ ${progress.done}/${progress.total} checking...`:"🚀 Check Rankings"}
            </button>
          </div>
        </div>

        {/* Results */}
        <div className="main">
          {loading&&(
            <div style={{padding:"13px 20px",borderBottom:"1px solid #13131f",background:"#0c0c18"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#4b5563",marginBottom:7}}>
                <span>Checking live rankings...</span>
                <span style={{color:"#818cf8"}}>{Math.round((progress.done/progress.total)*100)}%</span>
              </div>
              <div className="pbar"><div className="pfill" style={{width:`${(progress.done/progress.total)*100}%`}}/></div>
            </div>
          )}

          {results.length===0&&!loading&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"85%",gap:14}}>
              <div style={{fontSize:56}}>🦘</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,color:"#374151"}}>Australia cities ready!</div>
              <div style={{fontSize:12,color:"#1f2937",textAlign:"center",lineHeight:1.8}}>
                Sydney, Melbourne, Brisbane...<br/>
                <span style={{color:"#2d2d3d"}}>City-level Google rankings track karo</span>
              </div>
            </div>
          )}

          {results.length>0&&(
            <div style={{overflowX:"auto"}}>
              <table>
                <thead>
                  <tr>
                    <th style={{textAlign:"left"}}>KEYWORD</th>
                    {targets.map(t=>(
                      <th key={t.id} style={{minWidth:85}}>
                        {t.label}<br/>
                        {t.sublabel&&<span style={{fontSize:9,color:"#374151"}}>{t.sublabel}</span>}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {results.map((row,i)=>(
                    <tr key={i}>
                      <td style={{color:"#d1d5db",fontWeight:500,wordBreak:"break-word"}}>{row.keyword}</td>
                      {targets.map(t=>{
                        const r=row.cols[t.id];
                        const pos=r?.position;
                        if(pos==="...") return <td key={t.id}><span className="badge pulse" style={{color:"#1f2937",background:"#111"}}>···</span></td>;
                        if(pos==="ERR") return <td key={t.id}><span className="badge" style={{color:"#f87171",background:"#1c0505"}}>ERR</span></td>;
                        if(pos===null)  return <td key={t.id}><span className="badge" style={{color:"#4b5563",background:"#111"}}>NF</span></td>;
                        const b=getBadge(pos);
                        return(
                          <td key={t.id}>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                              <span className="badge" style={{color:b.color,background:b.bg}}>{b.label}</span>
                              {r?.url&&<a href={r.url} target="_blank" rel="noreferrer"
                                style={{fontSize:9,color:"#374151",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block",textDecoration:"none"}} title={r.url}>
                                {r.url.replace(/^https?:\/\/(www\.)?/,"").substring(0,18)}</a>}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{padding:"12px 20px",display:"flex",gap:10,flexWrap:"wrap",borderTop:"1px solid #111"}}>
                {[["#fbbf24","#78350f","🥇 1-3"],["#34d399","#064e3b","🟢 4-10"],["#60a5fa","#1e3a5f","🔵 11-20"],["#f97316","#431407","🟠 21-50"],["#ef4444","#450a0a","🔴 50+"],["#4b5563","#111","⚫ NF"]].map(([c,bg,lbl])=>(
                  <span key={lbl} className="badge" style={{color:c,background:bg,padding:"2px 8px",fontSize:10}}>{lbl}</span>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
